version: "3.9"
services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://forensica:pass@postgres:5432/forensica_db
      REDIS_URL: redis://redis:6379/0
    depends_on: [postgres, redis]
    networks: [forensica_net]
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    environment: {POSTGRES_DB: forensica_db, POSTGRES_USER: forensica, POSTGRES_PASSWORD: pass}
    volumes: [postgres_data:/var/lib/postgresql/data]
    networks: [forensica_net]
  redis:
    image: redis:7-alpine
    networks: [forensica_net]
  celery_worker:
    build: .
    command: celery -A core.celery_app worker --loglevel=info
    env_file: .env
    depends_on: [redis, postgres]
    networks: [forensica_net]
volumes:
  postgres_data:
networks:
  forensica_net:
    driver: bridge
